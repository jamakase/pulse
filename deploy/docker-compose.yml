# Deploy pulse behind an already-running Traefik.
#
#   1. DNS: point an A record for ${PULSE_HOST} at the server (before first
#      start, so ACME can issue the certificate).
#   2. On the server: mkdir -p /opt/pulse && cd /opt/pulse
#      cat > .env   # PULSE_API_KEY=$(openssl rand -hex 24), PULSE_HOST=…
#   3. docker compose up -d
#
# Traefik lives in another compose project's default network — attach to it
# as external via TRAEFIK_NETWORK.

services:
  pulse:
    image: ghcr.io/jamakase/pulse:${PULSE_TAG:-latest}
    restart: unless-stopped
    environment:
      PULSE_API_KEY: ${PULSE_API_KEY:?set PULSE_API_KEY in .env}
      PULSE_ALLOWED_ORIGINS: ${PULSE_ALLOWED_ORIGINS:-}
      PULSE_TTL_DAYS: ${PULSE_TTL_DAYS:-730}
      RUST_LOG: ${RUST_LOG:-pulse=info,info}
    volumes:
      - pulse-data:/data
    networks: [traefik]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pulse.rule=Host(`${PULSE_HOST:-events.example.com}`)"
      - "traefik.http.routers.pulse.entrypoints=websecure"
      - "traefik.http.routers.pulse.tls=true"
      - "traefik.http.routers.pulse.tls.certresolver=letsencrypt"
      - "traefik.http.services.pulse.loadbalancer.server.port=8080"

volumes:
  pulse-data:

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-webapp_default}
